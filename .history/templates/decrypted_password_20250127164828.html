<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decrypted Password</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .password-text {
            display: none;
        }
        .container {
            margin-top: 50px;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>Decrypted Password for {{ website }}</h2>
            </div>
            <div class="card-body">
                <div class="password-container d-flex align-items-center gap-2">
                    <span>Password: </span>
                    <span class="password-text" id="passwordText">{{ decrypted_password }}</span>
                    <button class="btn btn-primary btn-sm" id="togglePassword">Show Password</button>
                </div>
                <div class="mt-3">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordText = document.getElementById('passwordText');
            const button = this;
            
            if (passwordText.style.display === 'none' || !passwordText.style.display) {
                passwordText.style.display = 'inline';
                button.textContent = 'Hide Password';
            } else {
                passwordText.style.display = 'none';
                button.textContent = 'Show Password';
            }
        });
    </script>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
